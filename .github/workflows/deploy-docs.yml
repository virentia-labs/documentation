name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'virentia-labs/documentation'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Deploy docs
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SERVER }}
          port: 22
          user: ${{ secrets.SERVER_LOGIN }}
          pass: ${{ secrets.SERVER_PASSWORD }}
          localDir: ./docs/.vitepress/dist
          remoteDir: ${{ secrets.TARGET_DIR }}
          reverse: true
